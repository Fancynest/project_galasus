<!DOCTYPE html>
<html class="light" lang="id">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Galasus | Login Sistem</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: { "galasus-blue": "#0274BE" },
                    fontFamily: { "sans": ["Inter"] }
                }
            }
        }
    </script>
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
    </style>

    <link rel="icon" type="image/svg+xml" href="/public/photos/Logo-Galasus178x40.svg">
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen relative overflow-hidden selection:bg-blue-100">
    
    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-blue-300 rounded-full mix-blend-multiply filter blur-3xl opacity-30"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-blue-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>

    <div class="glass-panel w-full max-w-md rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] p-8 relative z-10 mx-4">
        
        <div class="text-center mb-8">
            <img src="/public/photos/Logo-Galasus178x40.svg" alt="Logo Galasus" class="h-10 mx-auto mb-6" onerror="this.outerHTML='<h1 class=\'text-3xl font-bold text-galasus-blue mb-2\'>GALASUS</h1>'" />
            <h2 class="text-2xl font-bold text-slate-800">Selamat Datang</h2>
            <p class="text-slate-500 text-sm mt-1">Silakan masuk ke portal manajemen</p>
        </div>

        <div id="alert-box" class="hidden mb-5 p-3.5 rounded-lg bg-red-50 border border-red-100 text-red-600 text-sm flex items-start gap-2.5">
            <span class="material-symbols-outlined text-[20px]">error</span>
            <span id="alert-message" class="font-medium mt-0.5">Pesan error di sini.</span>
        </div>

        <form id="login-form" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1.5" for="email">Email Karyawan</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">mail</span>
                    <input type="email" id="email" class="w-full pl-11 pr-4 py-2.5 bg-white border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-galasus-blue/20 focus:border-galasus-blue outline-none transition-all" placeholder="contoh@galasus.com" required>
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1.5" for="password">Kata Sandi</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">lock</span>
                    <input type="password" id="password" class="w-full pl-11 pr-4 py-2.5 bg-white border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-galasus-blue/20 focus:border-galasus-blue outline-none transition-all" placeholder="••••••••" required>
                </div>
            </div>

            <div class="flex justify-end pt-1">
                <a href="#" id="lupa-sandi" class="text-sm font-semibold text-galasus-blue hover:text-blue-800 transition-colors">Lupa sandi?</a>
            </div>

            <button type="submit" id="btn-submit" class="w-full bg-galasus-blue text-white py-2.5 rounded-lg font-semibold shadow-lg shadow-blue-900/20 hover:bg-blue-700 active:scale-[0.98] transition-all flex justify-center items-center gap-2 mt-2">
                <span id="btn-text">Masuk ke Sistem</span>
                <span id="btn-icon" class="material-symbols-outlined text-[20px]">login</span>
            </button>
        </form>
    </div>

    <script src="/public/js/dialog.js"></script>
    <script src="/public/js/login.js"></script>
</body>
</html>
